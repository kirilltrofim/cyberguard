version: '3.9'
services:
  api:
    build: ../src/Backend/Kiber.Api
    ports:
      - "5000:80"
    depends_on:
      - postgres
      - redis
  postgres:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
  redis:
    image: redis:7
    ports:
      - "6379:6379"
